<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 80" width="640" xmlns="http://www.w3.org/2000/svg"
     style="background:#fffefc; font-family:'Roboto',sans-serif;">

  <defs>
    <style>
      .t-base  { fill: #586e75; font-family: 'Roboto', sans-serif; font-size: 12px; }
      .t-green { fill: #859900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-red   { fill: #dc322f; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-amber { fill: #b58900; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-muted { fill: #93a1a1; font-family: 'Roboto', sans-serif; font-size: 11px; }
      .t-mono  { fill: #657b83; font-family: 'Roboto Mono', monospace; font-size: 10.5px; }
      .n-gray   { fill: #e4deca; stroke: #c5bcaa; }
      .n-green  { fill: rgba(133,153,0,.12);  stroke: rgba(133,153,0,.5); }
      .n-teal   { fill: rgba(42,161,152,.12); stroke: rgba(42,161,152,.5); }
      .n-purple { fill: rgba(108,113,196,.12);stroke: rgba(108,113,196,.5); }
      .n-red    { fill: rgba(220,50,47,.12);  stroke: rgba(220,50,47,.5); }
      .n-amber  { fill: rgba(181,137,0,.12);  stroke: rgba(181,137,0,.5); }
      .arr { stroke: #93a1a1; stroke-width: 1; fill: none; }
      text { font-family: 'Roboto', sans-serif; }
    </style>
  </defs>


      <defs>
        <marker id="arr6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <rect x="8"   y="20" width="90" height="32" rx="5" class="n-teal"   stroke-width="0.6"/>
      <text x="53"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--teal);font-size:11px">RateLimiter</text>
      <text x="53"  y="64" text-anchor="middle" class="t-muted" style="font-size:9px">① 가장 바깥</text>

      <line x1="98"  y1="36" x2="118" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr6)"/>

      <rect x="118"  y="20" width="96" height="32" rx="5" class="n-green"  stroke-width="0.6"/>
      <text x="166"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--blue);font-size:11px">CircuitBreaker</text>
      <text x="166"  y="64" text-anchor="middle" class="t-muted" style="font-size:9px">② 차단 판단</text>

      <line x1="214" y1="36" x2="234" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr6)"/>

      <rect x="234"  y="20" width="80" height="32" rx="5" class="n-green"  stroke-width="0.6"/>
      <text x="274"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--green);font-size:11px">Bulkhead</text>
      <text x="274"  y="64" text-anchor="middle" class="t-muted" style="font-size:9px">③ 슬롯 격리</text>

      <line x1="314" y1="36" x2="334" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr6)"/>

      <rect x="334"  y="20" width="88" height="32" rx="5" class="n-amber"  stroke-width="0.6"/>
      <text x="378"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--amber);font-size:11px">TimeLimiter</text>
      <text x="378"  y="64" text-anchor="middle" class="t-muted" style="font-size:9px">④ 타임아웃</text>

      <line x1="422" y1="36" x2="442" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr6)"/>

      <rect x="442"  y="20" width="64" height="32" rx="5" fill="rgba(108,113,196,.1)" stroke="rgba(108,113,196,.5)" stroke-width="0.6"/>
      <text x="474"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple);font-size:11px">Retry</text>
      <text x="474"  y="64" text-anchor="middle" class="t-muted" style="font-size:9px">⑤ 가장 안쪽</text>

      <line x1="506" y1="36" x2="526" y2="36" stroke="#93a1a1" stroke-width="1" marker-end="url(#arr6)"/>

      <rect x="526"  y="20" width="80" height="32" rx="5" class="n-purple" stroke-width="0.6"/>
      <text x="566"  y="36" text-anchor="middle" dominant-baseline="central" class="t-base" style="fill:var(--purple);font-size:11px">Method()</text>
    
</svg>