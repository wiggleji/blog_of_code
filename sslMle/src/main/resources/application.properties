spring.application.name=sslMle

server.port=8080

# Feign Client Configuration
feign.client.echo.url=http://localhost:${server.port}

# Feign Logging (requires logger level DEBUG for feign clients)
logging.level.com.wiggleji.sslmle.client=DEBUG

# HTTP Client Connection Pool Configuration
http.client.pool.max-total=100
http.client.pool.max-per-route=20

# SSL/mTLS Configuration (disabled by default for local development)
ssl.enabled=false
ssl.key-store.location=classpath:ssl/client-keystore.p12
ssl.key-store.password=changeit
ssl.key-store.type=PKCS12
ssl.trust-store.location=classpath:ssl/client-truststore.p12
ssl.trust-store.password=changeit
ssl.trust-store.type=PKCS12

# Message Level Encryption (MLE) Configuration (disabled by default)
mle.enabled=false
mle.key-id=demo-key-id
mle.key-id-header-name=keyId
mle.server-certificate-location=classpath:mle/server-cert.pem
mle.client-private-key-location=classpath:mle/client-private-key.pem
mle.client-private-key-passphrase=
mle.default-content-type=application/json
